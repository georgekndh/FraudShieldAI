<!doctype html>
<meta charset="utf-8" />
<title>FraudShield AI</title>
<h1>FraudShield Scorer</h1>
<form id="f">
  <input name="amount" type="number" step="0.01" placeholder="Amount" required>
  <input name="channel" placeholder="Channel (POS/WEB/ATM)" required>
  <input name="merchant_cat" placeholder="MCC" required>
  <input name="customer_age" type="number" placeholder="Customer age" required>
  <input name="hour" type="number" min="0" max="23" placeholder="Hour" required>
  <button>Score</button>
</form>
<pre id="out"></pre>
<script>
  const api = "http://127.0.0.1:8000/score";
  document.getElementById("f").onsubmit = async (e) => {
    e.preventDefault();
    const d = Object.fromEntries(new FormData(e.target).entries());
    d.amount = parseFloat(d.amount);
    d.customer_age = parseInt(d.customer_age);
    d.hour = parseInt(d.hour);
    const r = await fetch(api, {method:"POST", headers:{'Content-Type':'application/json'}, body:JSON.stringify(d)});
    document.getElementById("out").textContent = JSON.stringify(await r.json(), null, 2);
  };
</script>
